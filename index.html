<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gastos Fijos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .row-hover:hover {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-8 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Mis Gastos Fijos</h1>
                <p class="text-slate-500">Organiza y controla tus salidas de dinero mensuales</p>
            </div>
            <div class="bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-lg">
                <span class="text-sm block opacity-80 uppercase tracking-wider font-semibold">Total Mensual</span>
                <span id="gran-total" class="text-3xl font-bold">$ 0.00</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="glass-card rounded-3xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-6 py-4 text-slate-600 font-semibold text-sm uppercase">Categoría / Concepto</th>
                            <th class="px-6 py-4 text-slate-600 font-semibold text-sm uppercase">Datos de Pago</th>
                            <th class="px-6 py-4 text-slate-600 font-semibold text-sm uppercase w-40">Monto ($)</th>
                            <th class="px-6 py-4 text-slate-600 font-semibold text-sm uppercase w-20 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-gastos">
                        <!-- Las filas se insertan aquí -->
                    </tbody>
                </table>
            </div>

            <!-- Botón Añadir -->
            <div class="p-6 bg-slate-50/50 flex justify-center">
                <button onclick="agregarFila()" class="flex items-center gap-2 bg-white border border-slate-200 hover:border-indigo-400 hover:text-indigo-600 transition-all px-4 py-2 rounded-xl text-slate-600 font-medium shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    Añadir Nuevo Concepto
                </button>
            </div>
        </div>

        <!-- Tips Section -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <h3 class="text-blue-800 font-semibold mb-1">🏠 Vivienda</h3>
                <p class="text-blue-600 text-sm">Alquiler, servicios, seguros e internet.</p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                <h3 class="text-emerald-800 font-semibold mb-1">🛒 Suscripciones</h3>
                <p class="text-emerald-600 text-sm">Netflix, Spotify, gimnasio y apps.</p>
            </div>
            <div class="p-4 bg-purple-50 rounded-2xl border border-purple-100">
                <h3 class="text-purple-800 font-semibold mb-1">🎓 Otros</h3>
                <p class="text-purple-600 text-sm">Transporte fijo, educación o deudas.</p>
            </div>
        </div>
    </div>

    <script>
        const gastosIniciales = [
            { nombre: "Alquiler", datosPago: "", monto: 0 },
            { nombre: "Electricidad", datosPago: "", monto: 0 },
        ];

        const tbody = document.getElementById('lista-gastos');
        const totalDisplay = document.getElementById('gran-total');
        const STORAGE_KEY = 'gastos-fijos-data';

        // Guardar datos en localStorage
        function guardarDatos() {
            const filas = tbody.querySelectorAll('tr');
            const gastos = [];
            
            filas.forEach(fila => {
                const inputs = fila.querySelectorAll('input[type="text"]');
                const nombre = inputs[0].value;
                const datosPago = inputs[1].value;
                const monto = fila.querySelector('input[type="number"]').value;
                gastos.push({ nombre, datosPago, monto });
            });
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gastos));
        }

        // Cargar datos desde localStorage
        function cargarDatos() {
            const datosGuardados = localStorage.getItem(STORAGE_KEY);
            
            if (datosGuardados) {
                try {
                    const gastos = JSON.parse(datosGuardados);
                    return gastos.length > 0 ? gastos : gastosIniciales;
                } catch (e) {
                    console.error('Error al cargar datos:', e);
                    return gastosIniciales;
                }
            }
            
            return gastosIniciales;
        }

        function agregarFila(nombre = "", datosPago = "", monto = "") {
            const tr = document.createElement('tr');
            tr.className = "border-b border-slate-100 row-hover transition-colors";
            
            tr.innerHTML = `
                <td class="px-6 py-4">
                    <input type="text" value="${nombre}" placeholder="Ej: Gimnasio" 
                        oninput="guardarDatos()"
                        class="w-full bg-transparent border-none focus:ring-2 focus:ring-indigo-200 rounded-lg p-1 outline-none text-slate-700 font-medium">
                </td>
                <td class="px-6 py-4">
                    <input type="text" value="${datosPago}" placeholder="CBU, Alias, Cuenta, etc." 
                        oninput="guardarDatos()"
                        class="w-full bg-transparent border-none focus:ring-2 focus:ring-indigo-200 rounded-lg p-1 outline-none text-slate-600 text-sm">
                </td>
                <td class="px-6 py-4">
                    <div class="relative">
                        <span class="absolute left-0 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                        <input type="number" value="${monto}" step="0.01" oninput="calcularTotal(); guardarDatos();" placeholder="0.00"
                            class="monto-input w-full bg-transparent border-none focus:ring-2 focus:ring-indigo-200 rounded-lg py-1 pl-4 pr-1 outline-none text-slate-700 font-bold">
                    </div>
                </td>
                <td class="px-6 py-4 text-center">
                    <button onclick="eliminarFila(this)" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
            calcularTotal();
            guardarDatos();
        }

        function eliminarFila(btn) {
            const fila = btn.closest('tr');
            fila.style.opacity = '0';
            fila.style.transform = 'translateX(20px)';
            setTimeout(() => {
                fila.remove();
                calcularTotal();
                guardarDatos();
            }, 300);
        }

        function calcularTotal() {
            const inputs = document.querySelectorAll('.monto-input');
            let total = 0;
            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) total += val;
            });
            
            totalDisplay.innerText = `$ ${total.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        // Cargar datos al iniciar
        window.onload = () => {
            const gastosACargar = cargarDatos();
            gastosACargar.forEach(g => agregarFila(g.nombre, g.datosPago || "", g.monto));
        };
    </script>
</body>
</html>
